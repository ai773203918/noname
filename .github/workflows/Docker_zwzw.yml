# .github/workflows/build-main.yml

name: 构建前端 Docker 镜像

on:
  # 1. 当推送符合 'v*' 模式的标签时触发（例如 v1.0.0, v2.1.3）
  push:
    tags:
      - 'v*'
  # 2. 允许在 GitHub Actions 页面上手动触发工作流
  workflow_dispatch:
    inputs:
      tag:
        description: '发布的标签名称(例如 v0.0.0)'
        required: false
        default: ''

jobs:
  build-main-image:
    name: 构建并推送前端镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 权限以推送到GitHub Container Registry

    steps:
      # 检出代码
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          # 指定要检出的分支
          ref: build-output

      # 清理 Runner 磁盘空间
      - name: 清理磁盘空间
        run: |
          echo "🧹 清理旧的 Docker 镜像和缓存..."
          docker system prune -af --volumes
          echo "✅ 清理完成"
          df -h

      # 设置QEMU，用于构建多平台镜像
      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      # 设置Docker Buildx
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 获取当前日期
      - name: 获取当前日期
        id: get-date
        run: echo "date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      # 获取镜像标签名称
      - name: 获取 Image Tag
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            # 如果是push触发，使用标签名
            echo "TAG_NAME=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            # 如果是手动触发且填写了标签，使用填写的标签
            echo "TAG_NAME=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
          else
            # 如果是手动触发且没有填写标签，使用当前日期
            echo "TAG_NAME=${{ steps.get-date.outputs.date }}" >> $GITHUB_ENV
          fi

      # 登录到Docker Hub
      - name: 登录 DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # 登录到GitHub Container Registry
      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }} # 使用内置的 GITHUB_TOKEN

      # 准备镜像标签
      - name: 设置 Image Tags
        run: |
          echo "TAG=${{ secrets.DOCKERHUB_USERNAME }}/noname:${{ env.TAG_NAME }}" >> $GITHUB_ENV
          echo "TAG_LATEST=${{ secrets.DOCKERHUB_USERNAME }}/noname:latest" >> $GITHUB_ENV
          echo "GHCR_TAG=ghcr.io/${{ github.repository }}:${{ env.TAG_NAME }}" >> $GITHUB_ENV
          echo "GHCR_TAG_LATEST=ghcr.io/${{ github.repository }}:latest" >> $GITHUB_ENV

      # 创建 Dockerfile,而不是直接使用项目中的Dockerfile
      - name: 创建动态 Dockerfile
        run: |
          cat > ./Dockerfile << 'EOF'
          # 使用轻量级 Alpine 版 Node.js 20 镜像（减小最终镜像体积）
          FROM --platform=${TARGETPLATFORM} node:20-alpine
          # 设置生产环境变量
          ENV NODE_ENV=production
          # 设置工作目录
          WORKDIR /app
          # 复制项目文件
          COPY . .
          # 暴露服务端口（HTTP）
          EXPOSE 80
          CMD ["node", "noname.js"]
          EOF
          # 可选：打印出内容以便调试
          cat ./Dockerfile
  
      # 构建并推送镜像
      - name: 编译并推送 noname 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile # 指向前后端二合一的 Dockerfile
          platforms: linux/amd64,linux/arm64/v8 # 按需调整架构
          push: true
          tags: |
            ${{ env.TAG }}
            ${{ env.TAG_LATEST }}
            ${{ env.GHCR_TAG }}
            ${{ env.GHCR_TAG_LATEST }}
          cache-from: type=gha

      # Ghcr.io 自动公开化步骤
      - name: 将 Ghcr.io 包设置为公开
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh package edit noname --repo ${{ github.repository }} --visibility public
        env:
          GITHUB_TOKEN: ${{ github.token }}
