# .github/workflows/build-main.yml

name: 构建前端 Docker 镜像

on:
  # 1. 当推送符合 'v*' 模式的标签时触发（例如 v1.0.0, v2.1.3）
  push:
    tags:
      - 'v*'
  # 2. 允许在 GitHub Actions 页面上手动触发工作流
  workflow_dispatch:
    inputs:
      tag:
        description: '发布的标签名称(例如 v0.0.0)'
        required: false
        default: ''

jobs:
  build-main-image:
    name: 构建并推送前端镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 权限以推送到GitHub Container Registry

    steps:
      # 检出代码
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          # 指定要检出的分支
          ref: PR-Branch

      # 清理 Runner 磁盘空间
      - name: 清理磁盘空间
        run: |
          echo "🧹 清理旧的 Docker 镜像和缓存..."
          docker system prune -af --volumes
          echo "✅ 清理完成"
          df -h

      # 设置QEMU，用于构建多平台镜像
      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      # 设置Docker Buildx
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 获取当前日期
      - name: 获取当前日期
        id: get-date
        run: echo "date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      # 获取镜像标签名称
      - name: 获取 Image Tag
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            # 如果是push触发，使用标签名
            echo "TAG_NAME=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            # 如果是手动触发且填写了标签，使用填写的标签
            echo "TAG_NAME=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
          else
            # 如果是手动触发且没有填写标签，使用当前日期
            echo "TAG_NAME=${{ steps.get-date.outputs.date }}" >> $GITHUB_ENV
          fi

      # 登录到Docker Hub
      - name: 登录 DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # 登录到GitHub Container Registry
      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }} # 使用内置的 GITHUB_TOKEN

      # 准备镜像标签
      - name: 设置 Image Tags
        run: |
          echo "TAG=${{ secrets.DOCKERHUB_USERNAME }}/noname:${{ env.TAG_NAME }}" >> $GITHUB_ENV
          echo "TAG_LATEST=${{ secrets.DOCKERHUB_USERNAME }}/noname:latest" >> $GITHUB_ENV
          echo "GHCR_TAG=ghcr.io/${{ github.repository }}:${{ env.TAG_NAME }}" >> $GITHUB_ENV
          echo "GHCR_TAG_LATEST=ghcr.io/${{ github.repository }}:latest" >> $GITHUB_ENV

      # 创建 Dockerfile,而不是直接使用项目中的Dockerfile
      - name: 创建动态 Dockerfile
        run: |
          cat > ./Dockerfile << 'EOF'
          # ========================================================================
          # 第一阶段：构建阶段
          # ========================================================================
          # 使用 Node.js 20 官方镜像作为基础镜像（支持多平台构建）
          FROM --platform=${TARGETPLATFORM} node:20 AS builder
          
          # 全局安装 pnpm 包管理器（指定版本 9）
          RUN npm install -g pnpm@9
          
          # 设置工作目录为 /app
          WORKDIR /app
          
          # 复制项目依赖定义文件（利用 Docker 层缓存优化）
          # 这些文件变更频率较低，优先复制可提高构建效率
          COPY package.json pnpm-lock.yaml pnpm-workspace.yaml ./
          COPY apps/core/package.json ./apps/core/
          COPY apps/electron/package.json ./apps/electron/
          COPY apps/mobile/package.json ./apps/mobile/
          COPY packages/fs/package.json ./packages/fs/
          COPY packages/jit/package.json ./packages/jit/
          COPY packages/server/package.json ./packages/server/
          
          # 安装项目依赖（使用 --frozen-lockfile 确保依赖版本一致性）
          # RUN pnpm install --frozen-lockfile
          RUN pnpm install
          
          # 复制全部源代码（在依赖安装后复制，避免代码变更导致依赖重装）
          COPY . .
          
          # 构建核心应用（完整模式）
          RUN pnpm build:full
          
          # 构建文件服务器包
          RUN cd packages/fs && pnpm build
          
          # ========================================================================
          # 第二阶段：运行阶段
          # ========================================================================
          # 使用轻量级 Alpine 版 Node.js 20 镜像（减小最终镜像体积）
          FROM --platform=${TARGETPLATFORM} node:20-alpine
          
          # 设置生产环境变量
          ENV NODE_ENV=production
          
          # 全局安装 PM2 进程管理器
          RUN npm install -g pm2
          
          # 设置工作目录
          WORKDIR /app
          
          # 从构建阶段复制核心应用产物
          COPY --from=builder /app/apps/core/dist ./
          
          # 从构建阶段复制文件服务器产物
          COPY --from=builder /app/packages/fs/dist ./packages/fs/dist
          COPY --from=builder /app/packages/fs/package.json ./packages/fs/package.json
          
          # 复制并重命名游戏大厅服务器（.js 改为 .cjs 以兼容 CommonJS）
          COPY --from=builder /app/server.js ./server.cjs
          
          # # 复制配置文件
          # COPY process.yml ./
          # COPY http-server.js ./
          
          # 创建运行时 package.json（启用 ES 模块支持）
          RUN echo '{"type": "module"}' > package.json
          
          # 安装运行时核心依赖（精简版，不包含开发依赖）
          # 修复依赖导致无法联机问题(主要是ws)
          # RUN npm install --omit=dev ws fastify @fastify/cors @fastify/static minimist vue@^3.5.27
          RUN npm install --omit=dev ws@1.0.1 fastify @fastify/cors @fastify/static minimist vue@^3.5.27
          
          # 创建 Vue 符号链接（兼容 importmap）
          # 优先尝试生产版本，失败则回退到开发版本
          RUN ln -s node_modules/vue/dist/vue.esm-browser.prod.js vue.js || \
              ln -s node_modules/vue/dist/vue.esm-browser.js vue.js
          
          # 调试：打印目录结构（生产环境可移除）
          RUN echo "=== 检查 /app/src ===" && \
              ls -la /app/src || echo "src 目录不存在" && \
              echo "=== 检查 /app 根目录 ===" && \
              ls -la /app/
          
          # 暴露服务端口（HTTP 和 WebSocket）
          EXPOSE 80 8080
          
          # 使用 PM2 启动应用（根据 process.yml 配置）
          CMD ["pm2-runtime", "process.yml"]

          EOF

          # 添加脚本
          cat > ./http-server.js << 'EOF'
          import http from 'http';
          import fs from 'fs';
          import path from 'path';
          import { fileURLToPath } from 'url';
          
          const __dirname = path.dirname(fileURLToPath(import.meta.url));
          const PORT = 80;
          const ROOT_DIR = __dirname;
          const FS_SERVER_HOST = '127.0.0.1';
          const FS_SERVER_PORT = 8089;
          
          // Production Vue path
          const VUE_PROD_PATH = path.join(ROOT_DIR, 'node_modules', 'vue', 'dist', 'vue.esm-browser.prod.js');
          
          // FS API proxy endpoints
          const PROXY_PATHS = [
              '/checkFile',
              '/checkDir',
              '/readFile',
              '/readFileAsText',
              '/writeFile',
              '/removeFile',
              '/getFileList',
              '/createDir',
              '/removeDir'
          ];
          
          const MIME_TYPES = {
              '.html': 'text/html',
              '.js': 'text/javascript',
              '.mjs': 'text/javascript',
              '.ts': 'text/javascript',
              '.css': 'text/css',
              '.json': 'application/json',
              '.png': 'image/png',
              '.jpg': 'image/jpeg',
              '.jpeg': 'image/jpeg',
              '.gif': 'image/gif',
              '.svg': 'image/svg+xml',
              '.ico': 'image/x-icon',
              '.wav': 'audio/wav',
              '.mp3': 'audio/mpeg',
              '.ogg': 'audio/ogg',
              '.ttf': 'font/ttf',
              '.woff': 'font/woff',
              '.woff2': 'font/woff2',
              '.wasm': 'application/wasm',
              '.map': 'application/json'
          };
          
          const server = http.createServer((req, res) => {
              const urlPath = req.url.split('?')[0];
          
              // ========================================================================
              // Vue Production Build Redirect
              // ========================================================================
              // Force production Vue build to eliminate development warnings
              if (urlPath.includes('vue.esm-browser.js') || urlPath === '/vue' || urlPath.startsWith('/vue/')) {
                  fs.readFile(VUE_PROD_PATH, (err, content) => {
                      if (err) {
                          console.error(`[Vue Error] Production Vue not found at ${VUE_PROD_PATH}`);
                          res.writeHead(404);
                          res.end('Vue Not Found');
                      } else {
                          res.writeHead(200, { 'Content-Type': 'text/javascript' });
                          res.end(content, 'utf-8');
                      }
                  });
                  return;
              }
          
              // ========================================================================
              // Mode File Smart Resolution
              // ========================================================================
              // Game tries mode/xxx/index.js first, then falls back to mode/xxx.js
              // This proactively resolves the correct file to avoid unnecessary 404s
              const modeMatch = urlPath.match(/^\/mode\/([^/]+)\/index\.js$/);
              if (modeMatch) {
                  const modeName = modeMatch[1];
                  const indexJsPath = path.join(ROOT_DIR, 'mode', modeName, 'index.js');
                  const modeJsPath = path.join(ROOT_DIR, 'mode', `${modeName}.js`);
          
                  // Try mode/xxx/index.js first (directory-based mode like guozhan)
                  fs.stat(indexJsPath, (err, stats) => {
                      if (!err && stats.isFile()) {
                          fs.readFile(indexJsPath, (err, content) => {
                              if (err) {
                                  res.writeHead(404);
                                  res.end('File Not Found');
                              } else {
                                  res.writeHead(200, { 'Content-Type': 'text/javascript' });
                                  res.end(content, 'utf-8');
                              }
                          });
                          return;
                      }
          
                      // Fall back to mode/xxx.js (single-file mode like chess, identity)
                      fs.stat(modeJsPath, (err, stats) => {
                          if (!err && stats.isFile()) {
                              console.log(`[Mode] ${urlPath} -> /mode/${modeName}.js`);
                              fs.readFile(modeJsPath, (err, content) => {
                                  if (err) {
                                      res.writeHead(404);
                                      res.end('File Not Found');
                                  } else {
                                      res.writeHead(200, { 'Content-Type': 'text/javascript' });
                                      res.end(content, 'utf-8');
                                  }
                              });
                          } else {
                              res.writeHead(404);
                              res.end('File Not Found');
                          }
                      });
                  });
                  return;
              }
          
              // ========================================================================
              // JIT Test Virtual File
              // ========================================================================
              // Provides a virtual ES module for JIT TypeScript compilation detection
              if (urlPath.endsWith('jit-test.ts')) {
                  res.writeHead(200, { 'Content-Type': 'text/javascript' });
                  res.end('export const test = "ok";', 'utf-8');
                  return;
              }
          
              // ========================================================================
              // FS API Proxy
              // ========================================================================
              if (PROXY_PATHS.some(p => urlPath.startsWith(p))) {
                  const options = {
                      hostname: FS_SERVER_HOST,
                      port: FS_SERVER_PORT,
                      path: req.url,
                      method: req.method,
                      headers: req.headers
                  };
          
                  const proxyReq = http.request(options, (proxyRes) => {
                      res.writeHead(proxyRes.statusCode, proxyRes.headers);
                      proxyRes.pipe(res, { end: true });
                  });
          
                  proxyReq.on('error', (e) => {
                      console.error(`[Proxy Error] ${req.url} -> :${FS_SERVER_PORT} | ${e.message}`);
                      res.writeHead(502);
                      res.end('Bad Gateway: FS Server not reachable');
                  });
          
                  req.pipe(proxyReq, { end: true });
                  return;
              }
          
              // ========================================================================
              // Static File Serving
              // ========================================================================
              const filePath = path.join(ROOT_DIR, urlPath === '/' ? 'index.html' : urlPath);
          
              // Security check: prevent directory traversal
              if (!filePath.startsWith(ROOT_DIR)) {
                  res.writeHead(403);
                  res.end('Forbidden');
                  return;
              }
          
              fs.stat(filePath, (err, stats) => {
                  if (err) {
                      res.writeHead(404);
                      res.end('File Not Found');
                      return;
                  }
          
                  if (stats.isDirectory()) {
                      res.writeHead(404);
                      res.end('Directory listing forbidden');
                      return;
                  }
          
                  const extname = path.extname(filePath).toLowerCase();
                  const contentType = MIME_TYPES[extname] || 'application/octet-stream';
          
                  fs.readFile(filePath, (err, content) => {
                      if (err) {
                          res.writeHead(500);
                          res.end('Internal Server Error');
                      } else {
                          res.writeHead(200, { 'Content-Type': contentType });
                          res.end(content, 'utf-8');
                      }
                  });
              });
          });
          
          server.listen(PORT, () => {
              console.log(`HTTP server running at http://localhost:${PORT}/`);
              console.log(`Proxying FS API to ${FS_SERVER_HOST}:${FS_SERVER_PORT}`);
          });
          EOF

          # 添加脚本
          cat > ./process.yml << 'EOF'
          # ========================================================================
          # PM2 进程管理配置文件 (process.yml)
          # ========================================================================
          # 该文件定义了由 PM2 管理的三个主要应用服务：
          # 1. web-server:    静态文件和 HTTP API 服务
          # 2. game-lobby:    游戏大厅逻辑服务器
          # 3. fs-server:     文件系统服务
          
          apps:
            # --------------------------------------------------------------------
            # 应用 1: Web 服务器
            # --------------------------------------------------------------------
            - name: 'web-server'  # 为该进程指定一个易于识别的名称，用于日志和监控
              script: './http-server.js'  # 指定要执行的脚本文件路径，该路径相对于 `cwd`
              cwd: '/app'  # 设置进程启动时的工作目录。所有相对路径都将基于此目录解析
              env:
                NODE_ENV: 'production'  # 为该进程设置环境变量，明确指定为生产模式
          
            # --------------------------------------------------------------------
            # 应用 2: 游戏大厅服务器
            # --------------------------------------------------------------------
            - name: 'game-lobby'  # 进程名称
              script: './server.cjs'  # 指定脚本。使用 .cjs 后缀强制以 CommonJS 模式运行
              cwd: '/app'  # 工作目录，与 web-server 保持一致
              env:
                NODE_ENV: 'production'  # 设置为生产模式
          
            # --------------------------------------------------------------------
            # 应用 3: 文件系统 (fs) 服务器
            # --------------------------------------------------------------------
            - name: 'fs-server'  # 进程名称
              # 指定脚本路径。该脚本是 `packages/fs` 包构建后的入口文件
              script: './packages/fs/dist/entry.cjs'
              cwd: '/app'  # 工作目录
              env:
                NODE_ENV: 'production'  # 设置为生产模式
                # 显式指定 `fs-server` 监听的端口。
                # 这是一种良好实践，可避免端口冲突，并使配置清晰可查。
                PORT: 8089
          EOF

          # 可选：打印出内容以便调试
          cat ./Dockerfile
  
      # 构建并推送镜像
      - name: 编译并推送 noname 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile # 指向前后端二合一的 Dockerfile
          # platforms: linux/amd64,linux/arm64/v8 # 按需调整架构
          platforms: linux/amd64 # 按需调整架构
          push: true
          tags: |
            ${{ env.TAG }}
            ${{ env.TAG_LATEST }}
            ${{ env.GHCR_TAG }}
            ${{ env.GHCR_TAG_LATEST }}
          cache-from: type=gha

      # Ghcr.io 自动公开化步骤
      - name: 将 Ghcr.io 包设置为公开
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh package edit noname --repo ${{ github.repository }} --visibility public
        env:
          GITHUB_TOKEN: ${{ github.token }}
